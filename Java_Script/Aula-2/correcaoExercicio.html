<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Boletim do Aluno</title>
    <link rel="stylesheet" href="./correcaoExercicio.css" />
  </head>
  <body>
    <div class="container">
      <h1>Portal do Aluno</h1>

      <div class="form-aluno">
        <label for="nome">Nome do aluno:</label>
        <input type="text" id="nome" placeholder="Digite o nome completo" />

        <label for="nota1">Nota da prova 1:</label>
        <input type="number" id="nota1" placeholder="0,0" />

        <label for="nota2">Nota da prova 2:</label>
        <input type="number" id="nota2" placeholder="0,0" />

        <label for="nota3">Nota da prova 3:</label>
        <input type="number" id="nota3" placeholder="0,0" />

        <button onclick="gerarBoletim()">Lançar Notas</button>
      </div>

      <!-- ! o resultado vai aparecer aqui dentro -->
      <div id="boletim-area"></div>
    </div>
  </body>
  <script src="./correcaoExercicio.js"></script>
</html>
