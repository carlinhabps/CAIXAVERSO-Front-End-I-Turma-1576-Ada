<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="style.css" />
    <title>Dicionario Inteligente</title>
  </head>
  <body>
    <div class="card">
      <h1>Dicionário Inteligente</h1>
      <p>Exemplo de estrutura MAP (mapeando objetos com chave/valor)</p>

      <!-- ! Área de cadastro -->
      <div class="section-cadastro">
        <h2>Cadastra palavras:</h2>

        <input type="text" id="chaveNova" placeholder="Digite a palvra chave" />
        <input
          type="text"
          id="valorNovo"
          placeholder="Preencha aqui com o significado/sinônimos"
        />
        <button onclick="cadastrarDefinicao()">Adicionar ao dicionário</button>
      </div>

      <!-- ! Área de busca -->
      <div class="section-consulta">
        <h2>Consultar</h2>

        <input type="text" id="termoBusca" placeholder="Pesquisar palavra..." />
        <button onclick="pesquisarTermo()">Buscar</button>
      </div>

      <!-- ! Aqui ai aparecer o resultado -->
      <div id="resultadoDicionario" class="result-box"></div>
    </div>
  </body>

  <script src="dicionario.js"></script>
</html>
