<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de dados</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="card">
        <h1>🎲 Mestre dos dados</h1>

        <div class="input-group">
            <label for="qtd">Quantidade de dados:</label>
            <input type="number" id="qtd" placeholder="Ex: 3" />
        </div>
        
        <div class="input-group">
            <label for="lados">Número de lados:</label>
            <input type="number" id="lados" placeholder="Ex: 6" />
        </div>

        <button onclick="jogar()">Rolar dados!</button>

        <!-- Aqui serão exibidos os dados rolados -->
        <div id="resultado"></div>

    </div>
</body>
<script src="logica.js"></script>
<script src="interface.js"></script>
</html>
